<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 第六师兵团库房管理系统</title>
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components/loading.css">
    <link rel="stylesheet" href="/static/css/components/toast.css">
    <link rel="stylesheet" href="/static/css/components/form.css">
    <link rel="stylesheet" href="/static/css/components/button.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-page">
        <!-- 动态背景 -->
        <div class="login-bg">
            <!-- 浮动光球 -->
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
            
            <!-- 粒子效果 -->
            <div class="particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
        </div>
        
        <!-- 登录容器 -->
        <div class="login-container">
            <div class="login-card">
                <!-- 登录头部 -->
                <div class="login-header">
                    <div class="login-logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h1 class="login-title">库房管理系统</h1>
                    <p class="login-subtitle">第六师兵团 · WAREHOUSE MANAGEMENT</p>
                </div>
                
                <!-- 登录表单 -->
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-with-icon">
                            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" autocomplete="username">
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-with-icon input-with-suffix">
                            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                                </svg>
                            </span>
                            <span class="input-suffix" id="togglePassword">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="captcha-group">
                            <div class="input-with-icon">
                                <input type="text" id="captcha" name="captcha" class="form-input" placeholder="请输入计算结果" autocomplete="off">
                                <span class="input-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                    </svg>
                                </span>
                            </div>
                            <div class="captcha-box" id="captchaBox" title="点击刷新验证码">
                                <span class="captcha-text" id="captchaText"></span>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" id="loginBtn" class="btn btn-primary btn-block login-btn">
                        登 录
                    </button>
                </form>
                
                <!-- 登录底部 -->
                <div class="login-footer">
                    <p class="login-footer-text">© 2026 第六师兵团库房管理系统</p>
                </div>
            </div>
        </div>
        
        <!-- 系统信息 -->
        <div class="system-info">
            <p class="system-info-text">WAREHOUSE MANAGEMENT SYSTEM v1.0</p>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script src="/static/js/utils/api.js"></script>
    <script src="/static/js/utils/loading.js"></script>
    <script src="/static/js/utils/toast.js"></script>
    <script src="/static/js/utils/captcha.js"></script>
    <script src="/static/js/pages/login.js"></script>
</body>
</html>
