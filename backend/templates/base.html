<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}第六师兵团库房管理系统{% endblock %}</title>
    <!-- CSS模块 -->
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components/loading.css">
    <link rel="stylesheet" href="/static/css/components/toast.css">
    <link rel="stylesheet" href="/static/css/components/form.css">
    <link rel="stylesheet" href="/static/css/components/button.css">
    <link rel="stylesheet" href="/static/css/components/sidebar.css">
    <link rel="stylesheet" href="/static/css/components/header.css">
    <link rel="stylesheet" href="/static/css/components/table.css">
    <link rel="stylesheet" href="/static/css/components/modal.css">
    <link rel="stylesheet" href="/static/css/components/card.css">
    <link rel="stylesheet" href="/static/css/main.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div>
                <div class="logo-text">库房管理系统</div>
                <div class="logo-subtitle">第六师兵团</div>
            </div>
        </div>
        
        <nav class="sidebar-menu">
            <!-- 菜单由JS动态生成 -->
        </nav>
        
        <button class="sidebar-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
    </aside>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 顶部栏 -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-menu-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <h1 class="page-title">{% block page_title %}仪表盘{% endblock %}</h1>
            </div>
            
            <div class="header-right">
                <div class="header-time"></div>
                
                <button class="header-fullscreen" title="全屏">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
                    </svg>
                </button>
                
                <div class="header-user logout-btn">
                    <div class="user-avatar">A</div>
                    <div class="user-info">
                        <div class="user-name">admin</div>
                        <div class="user-role">系统管理员</div>
                    </div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="logout-icon">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </div>
            </div>
        </header>
        
        <!-- 内容区域 -->
        <main class="main-content">
            <div class="page-container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <!-- JavaScript模块 -->
    <script src="/static/js/utils/api.js"></script>
    <script src="/static/js/utils/loading.js"></script>
    <script src="/static/js/utils/toast.js"></script>
    <script src="/static/js/utils/form.js"></script>
    <script src="/static/js/components/sidebar.js"></script>
    <script src="/static/js/components/header.js"></script>
    <script src="/static/js/components/modal.js"></script>
    <script src="/static/js/pages/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
